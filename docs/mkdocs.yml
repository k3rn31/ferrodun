site_name: Ferrodun
site_description: A pure-Rust MUD/MU* engine.
site_url: https://k3rn31.github.io/ferrodun/
repo_url: https://github.com/k3rn31/ferrodun
repo_name: k3rn31/ferrodun
edit_uri: edit/main/docs/docs
copyright: Made with care by the Ferrodun contributors.

# The docs live under docs/docs so that the mkdocs project root (this file)
# sits next to the gh-pages tooling and `mike` runs with `working-directory:
# docs`. See .github/workflows/docs.yml.
docs_dir: docs

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

extra:
  version:
    provider: mike
    default: latest
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/k3rn31/ferrodun
      name: GitHub

nav:
  - Home: index.md
  - Architecture:
      - Overview: architecture/index.md
      - Engine & the tick loop: architecture/engine.md
      - Sessions & login: architecture/sessions.md
      - Rendering & color: architecture/rendering.md
      - Internationalization: architecture/i18n.md
  - Playing:
      - Getting started: playing/getting-started.md
      - Commands: playing/commands.md
  - Building:
      - World files: building/world-files.md
      - Rooms: building/rooms.md
      - Regions: building/regions.md
      - Color & styling: building/styling.md
      - Localization: building/localization.md
  - Operating:
      - Running a server: operating/running-a-server.md
      - Configuration: operating/configuration.md
      - Logging: operating/logging.md

plugins:
  - search

markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true

  # PyMdown Extensions
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
